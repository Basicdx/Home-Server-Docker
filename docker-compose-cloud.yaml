name: cloud
services:

#########################
# Nextcloud | CLoud
#########################
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_BASE_DIR}/nextcloud:/config
      - ${CONFIG_BASE_DIR}/nextcloud:/data
      - ${NETXCLOUD_DB}:/nexcloud
    depends_on:
      - nextcloud-db
    networks:
      - cloud_net
      - tailscale_net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: 1
    restart: unless-stopped

  nextcloud-db:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: nextcloud-db
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_USER}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ${CONFIG_BASE_DIR}/nextcloud_db:/config
    networks:
      - cloud_net
    restart: unless-stopped

