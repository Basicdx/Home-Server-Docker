services:
##########################
## UPTIME-KUMA | Monitoring Server
##########################
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma

    env_file:
      - /home/basic/Homelab/compose/.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data:/app/data
    networks:
      - frontend_net
    ports:
      - "3001:3001"    
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  frontend_net:
    external: true