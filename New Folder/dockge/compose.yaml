services:
  ##########################
  ## DOCKGE | Dashboard
  ##########################
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped

    environment:
      - TZ=${TZ:?err}
      - DOCKGE_STACKS_DIR=/stacks
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ${BASE_DIR}:/stacks
    networks:
      - frontend
    ports:
      - "5001:5001"    
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
    driver: bridge
    external: true
