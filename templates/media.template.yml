services:

  app:
    image: IMAGE:TAG
    container_name: NAME
    restart: unless-stopped

    env_file:
      - ${BASE_DIR}/.env
    ports:
      - "HOST_PORT:CONTAINER_PORT" #HTTP/HTTPS/WEBUI
    volumes:
      - ./config:/config
      - ${MEDIA_DIR}:/media:ro
      - ${DOWNLOAD_DIR}:/downloads      

    networks:
      - frontend_net
    security_opt:
      - no-new-privileges:true
   # cap_drop:
   #    - ALL  # Deactivate ALL default capabilities
   #  cap_add:
   #    - NET_ADMIN  # Manage network interface
   #    - NET_RAW    # Manage RAW packages (necessary for Tailscale)    
    # deploy:
    #   resources:
    #     limits:
    #       memory:
    #       cpus:   
    # depends_on:
    #   - 
    # healthcheck:      

networks:
  # Exposed Services
  frontend_net:
    driver: bridge
    external: true