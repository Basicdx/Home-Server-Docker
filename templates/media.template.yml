services:

  app:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin

    env_file:
      - ./.env

    volumes:
      - ./config:/config
      - /mnt/storage/media:/media

    ports:
      - "8096:8096"

    networks:
      - frontend_net
      - backend_net

    security_opt:
      - no-new-privileges:true

    restart: unless-stopped

networks:
  frontend_net:
    external: true
  backend_net:
    external: true
