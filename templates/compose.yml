services:
########################
# APP | Use
#########################
  app:
    image: xxx
    container_name: xxx
    # network-mode: service:
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/config
      - ./data:/data

    networks:
      - xxx
    ports:
      - xxx:xxx  
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  
    # depends_on:
    #   - 
    # deploy:
    #   resources:
    #     limits:
    #       memory:
    #       cpus: 

networks:
  xxx_net:
    external: true
