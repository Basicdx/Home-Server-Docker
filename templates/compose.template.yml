services:
########################
# APP | Use
#########################
  app:
    image: IMAGE:TAG
    container_name: NAME
    # network-mode: service:
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/config
      - ./data:/data

    ports:
      - "HOST_PORT:CONTAINER_PORT"  
    networks:
      - xxx    
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  
    # depends_on:
    #   - 
    # deploy:
    #   resources:
    #     limits:
    #       memory:
    #       cpus: 

networks:
  xxx_net:
    external: true
