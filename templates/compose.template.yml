services:
########################
# APP | Function
#########################
  app:
    image: IMAGE:TAG  # Image repo, prefer :lastest
    container_name: NAME
    restart: unless-stopped  # Anti-crash
    # hostname: hostname  # Only for Tailscale?
    # network-mode: service:NAME  # Only for Tailscale?
    # cap_drop:
    #    - ALL  # Deactivate ALL default capabilities
    # cap_add:
    #    - NET_ADMIN  # Manage network interface
    #    - NET_RAW    # Manage RAW packages (necessary for Tailscale)  

    env_file:
      - ../.env
    environment:
      - PUID=${PUID}  # User, default:1000
      - PGID=${PGID}  # Group, default:1000
      - TZ=${TZ}  # TimeZone
      - NAME_PASSWORD=${NAME_PASSWORD}  # Password/API/Key/Token
    ports:
      - "HOST_PORT:CONTAINER_PORT" #HTTP/HTTPS/WEBUI
    volumes:
      - ${CONFIG}:/config  # Config Path, default ./config
      - ${DATA}:/data  # Data Path, default ./data
      - ${DB}:/db  # Database Path, default ./db
      - ${MEDIA}:/media  # Media Path, deault mnt/media
      - ${DOWNLOAD}:/downloads  # Download Path, default mnt/download
      
    networks:
      - network_name    
    security_opt:
      - no-new-privileges:true  
    # deploy:  # For ollama, jellyfin, immich, nextcloud
    #   resources:
    #     limits:
    #       memory:
    #       cpus:   
    # depends_on:
    #   - 
    # healthcheck:
    
networks:
  # Exposed Services
  frontend:
    driver: bridge
    external: true
  # Database  
  backend:
    driver: bridge
    external: true
  # Torrent
  download:
    driver: bridge
    external: true
