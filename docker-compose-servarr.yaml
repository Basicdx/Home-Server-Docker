#########################
# SEER | Agregat
#########################
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ${CONFIG_BASE_DIR}/seer:/configs
    networks:
      - media_net
      - tailscale_net
    depends_on:
      - sonarr
      - radarr
      - lidarr
      - prowlarr      
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

