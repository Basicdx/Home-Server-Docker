#########################
# UNPACKERR | unpacking
#########################
  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    user: 1024:100
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
      - UN_DEBUG=true
      - UN_DIR_MODE=0755
      - UN_FILE_MODE=0644
      - UN_FOLDER_0_DELETE_AFTER=10m
      - UN_FOLDER_0_DELETE_FILES=false
      - UN_FOLDER_0_DELETE_ORIGINAL=false
      - UN_FOLDER_0_EXTRACT_ISOS=true
      - UN_FOLDER_0_EXTRACT_PATH=
      - UN_FOLDER_0_MOVE_BACK=false
      - UN_FOLDER_0_PATH=${DOWNLOADS_DIR_COMPLETE_RELATIVE}
      - UN_INTERVAL=2m
      - UN_LIDARR_0_API_KEY=${UN_LIDARR_0_API_KEY}
      - UN_LIDARR_0_DELETE_DELAY=5m
      - UN_LIDARR_0_DELETE_ORIG=false
      - UN_LIDARR_0_PATHS_0=${DOWNLOADS_DIR_COMPLETE_RELATIVE}
      - UN_LIDARR_0_PROTOCOLS=torrent,usenet
      - UN_LIDARR_0_TIMEOUT=10s
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LOG_FILE_MB=10
      - UN_LOG_FILE=
      - UN_LOG_FILES=10
      - UN_MAX_RETRIES=3
      - UN_PARALLEL=1
      - UN_RADARR_0_API_KEY=${UN_RADARR_0_API_KEY}
      - UN_RADARR_0_DELETE_DELAY=5m
      - UN_RADARR_0_DELETE_ORIG=false
      - UN_RADARR_0_PATHS_0=${DOWNLOADS_DIR_COMPLETE_RELATIVE}
      - UN_RADARR_0_PROTOCOLS=torrent,usenet
      - UN_RADARR_0_TIMEOUT=10s
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_READARR_0_API_KEY=${UN_READARR_0_API_KEY}
      - UN_READARR_0_DELETE_DELAY=5m
      - UN_READARR_0_DELETE_ORIG=false
      - UN_READARR_0_PATHS_0=${DOWNLOADS_DIR_COMPLETE_RELATIVE}
      - UN_READARR_0_PROTOCOLS=torrent,usenet
      - UN_READARR_0_TIMEOUT=10s
      - UN_READARR_0_URL=http://readarr:8787
      - UN_RETRY_DELAY=5m
      - UN_SONARR_0_API_KEY=${UN_SONARR_0_API_KEY}
      - UN_SONARR_0_DELETE_DELAY=5m
      - UN_SONARR_0_DELETE_ORIG=false
      - UN_SONARR_0_PATHS_0=${DOWNLOADS_DIR_COMPLETE_RELATIVE}
      - UN_SONARR_0_PROTOCOLS=torrent,usenet
      - UN_SONARR_0_TIMEOUT=10s
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_START_DELAY=1m
      - UN_WEBSERVER_LISTEN_ADDR=0.0.0.0:5656
      - UN_WEBSERVER_METRICS=true
      - UN_WEBSERVER_URLBASE=/unpackerr_metrics
      - UNPACKERR_QBITTORRENT_0_URL=http://gluetun:8080
      - UNPACKERR_QBITTORRENT_0_USERNAME=${QBITTORRENT_USER}
      - UNPACKERR_QBITTORRENT_0_PASSWORD=${QBITTORRENT_PASSWORD}
      # TODO: Add Notifiarr for webhook
      # - UN_CMDHOOK_0_COMMAND=
