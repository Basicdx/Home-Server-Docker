      # - UN_WEBHOOK_0_TEMPLATE_PATH=
      # - UN_WEBHOOK_0_TIMEOUT=10s
      # - UN_WEBHOOK_0_URL=
    networks:
      - downloads_net
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DOWNLOADS_DIR_COMPLETE_LOCAL}:${DOWNLOADS_DIR_COMPLETE_RELATIVE}
    ports:
      - 5656:5656
    restart: unless-stopped

#########################
# GLUETUN | VPN avec support DuckDNS/Cloudflare
#########################
  gluetun:
    image: qdm12/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}  # Ex: nordvpn, protonvpn, etc.
      - VPN_TYPE=${VPN_TYPE} #openvpn or wireguard
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_REGIONS=${SERVER_REGIONS}  # Ex: france, netherlands
      - DOT=off  # Désactive le DNS-over-TLS (AdGuard gère déjà le DNS)
      - FIREWALL=on
      - FIREWALL_VPN_INPUT_PORTS=8080/tcp,6881/tcp,6881/udp  # Ports pour qBittorrent
      # DuckDNS (si choisi)
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}  # Optionnel, si tu utilises DuckDNS
      - DUCKDNS_DOMAIN=${DUCKDNS_DOMAIN}  # Ex: ton-domaine.duckdns.org
      # Cloudflare (si choisi)
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}  # Optionnel
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}  # Optionnel
      - CLOUDFLARE_RECORD_NAME=${CLOUDFLARE_RECORD_NAME}  # Ex: vpn.tondomaine.com
    volumes:
      - ${CONFIG_BASE_DIR}/gluetun:/gluetun
    networks:
      - tailscale_net
      - downloads_net
    ports:
      - 6881:6881 # qbittorrent
      - 6881:6881/udp # qbittorrent
      - 8091:8091 # qbittorrent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "openvpn"]
      interval: 10s
      timeout: 5s
      retries: 5
  
#########################
# qBittorrent (client torrent + VPN via Gluetun)
#########################
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun  # Tout le trafic passe par Gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - ${DOWNLOADS_DIR_TORRENT}:/torrents
    depends_on:
      - gluetun
    restart: unless-stopped

#########################
# NETWORK |
#########################
networks:
  media_net:  # Jellyfin, Navidrome, Servarr, Bazarr, Homarr
    name: media_net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
      com.docker.network.bridge.name: "media_net"
      com.docker.network.driver.mtu: "1500"
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY_IP}
          ip_range: ${IP_RANGE}
  downloads_net:   # qBittorrent (via Gluetun) et Servarr
    driver: bridge
  tailscale_net:   # Tailscale, AdGuard, Syncthing, Homarr, Nginx
    driver: bridge
