# ||--------------------------------------------------------------------------------||
# ||                                Media Player Applications                       ||
# ||--------------------------------------------------------------------------------||
name: media
services:

#########################
# JELLYFIN | mediaplayer
#########################
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest #optimisé
    container_name: jellyfin
    hostname: jellyfin
    environment:
     - PGID=${PGID}
     - PUID=${PUID}
     - TZ=${TZ}
     - UMASK=${UMASK}
    networks:
     - media_net
    volumes:
     - ${BOOKS_DIR_LOCAL}:${BOOKS_DIR_RELATIVE}
     - ${CONFIG_BASE_DIR}/jellyfin:/config
     - ${CONFIG_BASE_DIR}/jellyfin/cache:/cache
     - ${MOVIES_DIR_LOCAL}:${MOVIES_DIR_RELATIVE}:ro #read-only
     - ${MUSIC_DIR_LOCAL}:${MUSIC_DIR_RELATIVE}:ro #read-only
     - ${TV_DIR_LOCAL}:${TV_DIR_RELATIVE}:ro #read-only
    ports:
     #- 1900:1900/udp #DLNA port
     - 7359:7359/udp #network discovery
     - 8096:8096 #web interface
     - 8920:8920 #https
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G  # Limite à 4 Go de RAM
          cpus: 2     # Limite à 2 cœurs CPU  

#########################
# NAVIDROME | music player
#########################
  navidrome:
    image: deluan/navidrome:latest
    container_name : navidrome
    environment:
    - PGID=${PGID}
    - PUID=${PUID}
    - TZ=${TZ}
    - UMASK=${UMASK}
    networks:
    - media_net
    volumes:
     - ${CONFIG_BASE_DIR}/navidrome:/config
     - ${CONFIG_BASE_DIR}/navidrome:/data
     - ${MUSIC_DIR_LOCAL}:${MUSIC_DIR_RELATIVE}:ro #read-only
    ports:
     - "4533:4533"
    restart: unless-stopped

#########################
# ROMM | retro gaming
#########################
  romm:
    image: rommapp/romm:latest
    container_name: romm
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_BASE_DIR}/romm:/config
      - ${ROM_DIR_LOCAL}:${ROM_DIR_RELATIVE}
    networks:
      - media_net
    restart: unless-stopped

#########################
# IMMICH | photo manager
#########################
  immich_server: #serveur principal
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_server
    hostname: immich-server
    depends_on:
      - immich_redis
      - immich_database
    environment:
      - UPLOAD_LOCATION=${PHOTOS_DIR_LOCAL}
      - DB_DATA_LOCATION=${CONFIG_BASE_DIR}/immich
      - IMMICH_VERSION=${IMMICH_VERSION}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - REDIS_HOSTNAME=immich-redis
      - DB_HOSTNAME=immich-database
    networks:
      - media_net
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${PHOTOS_DIR_LOCAL}:/upload
      - ${CONFIG_BASE_DIR}/immich_server:/data
    ports:
      - 2283:3001
    #command: ["start.sh", "immich"]
    depends_on:
      immich_database:
        condition: service_healthy
      immich-redis:
        condition: service_started
    networks:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: 1
  

  immich_microservices:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_microservices
    hostname: immich_microservices
    depends_on:
      - immich_redis
      - immich_database
    environment:
      - UPLOAD_LOCATION=${PHOTOS_DIR_LOCAL}
      - DB_DATA_LOCATION=${CONFIG_BASE_DIR}/immich
      - IMMICH_VERSION=${IMMICH_VERSION}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - REDIS_HOSTNAME=immich-redis
      - DB_HOSTNAME=immich-database
    networks:
      - media_net
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${PHOTOS_DIR_LOCAL}:/usr/src/app/upload
      - ${CONFIG_BASE_DIR}/immich_microservices:/data
    #command: ["start.sh", "microservices"]
    restart: unless-stopped

  immich_machine_learning: #reconnaissance d'images
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich_machine_learning
    hostname: immich_machine_learning
    environment:
      - UPLOAD_LOCATION=${PHOTOS_DIR_LOCAL}
      - DB_DATA_LOCATION=${CONFIG_BASE_DIR}/immich
      - IMMICH_VERSION=${IMMICH_VERSION}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - REDIS_HOSTNAME=immich-redis
      - DB_HOSTNAME=immich-database
    volumes:
      - ${CONFIG_BASE_DIR}/immich:/cache
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: 1

  immich_redis: #cache
    image: docker.io/redis:6.2-alpine@sha256:e31ca60b18f7e9b78b573d156702471d4eda038803c0b8e6f01559f350031e93
    container_name: immich_redis
    hostname: immich-redis
    environment:
      - UPLOAD_LOCATION=${PHOTOS_DIR_LOCAL}
      - DB_DATA_LOCATION=${CONFIG_BASE_DIR}/immich/database
      - IMMICH_VERSION=${IMMICH_VERSION}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - REDIS_HOSTNAME=immich-redis
      - DB_HOSTNAME=immich-database
    volumes:  
      - ${CONFIG_BASE_DIR}/immich_redis:/data
    networks:
      - media_net
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  immich_database: #base de données PostgreSQL
    container_name: immich_database
    hostname: immich-database
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      - POSTGRES_DB=${IMMICH_DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS='--data-checksums'
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_USER=${IMMICH_DB_USERNAME}
      - REDIS_HOSTNAME=immich-redis
      - DB_HOSTNAME=immich-database
    networks:
      - media_net
    volumes:
      - ${CONFIG_BASE_DIR}/immich:/database
    healthcheck:
      test: pg_isready --dbname='${IMMICH_DB_DATABASE_NAME}' || exit 1; Chksum="$$(psql --dbname='${IMMICH_DB_DATABASE_NAME}' --username='${IMMICH_DB_USERNAME}' --tuples-only --no-align --command='SELECT SUM(checksum_failures) FROM pg_stat_database')"; echo "checksum failure count is $$Chksum"; [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=vectors.so",
        "-c",
        'search_path="$$user", public, vectors',
        "-c",
        "logging_collector=on",
        "-c",
        "max_wal_size=2GB",
        "-c",
        "shared_buffers=512MB",
        "-c",
        "wal_compression=on",
      ]
    restart: unless-stopped

#########################
# PAPERLESS-NGX | Documents manager
#########################
  paperless-ngx:
    image: lscr.io/linuxserver/paperless-ngx:latest
    container_name: paperless-ngx
    hostname: paperless-ngx
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
      - UMASK=${UMASK}
      - REDIS_URL=
    networks:
      - media_net
    volumes:
      - ${CONFIG_BASE_DIR}/paperless-ngx:/config
      - ${DOCUMENTS_DIR_LOCAL}/paperless-ngx:/data
    ports:
      - 8001:8000
    restart: unless-stopped

#########################
# NETWORKS | 
#########################
networks:
  media_net:
    name: media_net # Jellyfin, Navidrome, Servarr, Bazarr, Homarr
    external: true
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
      com.docker.network.bridge.name: "media_net"
      com.docker.network.driver.mtu: "1500"
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY_IP}
          ip_range: ${IP_RANGE}
