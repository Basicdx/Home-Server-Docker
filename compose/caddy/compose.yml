services:
#########################
# CADDY | Reverse Proxy + TLS
#########################
  caddy:
    image: caddy:2.8.4
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" # ✅ Écoute sur toutes les interfaces (mais uniquement accessible via Tailscale)
      - "443:443/udp"  
      # - "127.0.0.1:443:443"  # ✅ Écoute UNIQUEMENT sur localhost
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA:?err}/caddy/data:/data
      - ${DATA:?err}/caddy/config:/config
      - ${DATA:?err}/caddy/site:/srv
      - ${DATA:?err}/tailscale/certs:/var/lib/tailscale/certs:ro      
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    depends_on:
      tailscale:
        condition: service_healthy      
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
networks:
  frontend:
    driver: bridge
    external: true
