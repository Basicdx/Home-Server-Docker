services:
########################
# CADDY | Reverse Proxy
#########################
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
  
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data:/data
      - ./config:/config
    networks:
      - frontend_net
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
    # labels:
    #   - "com.centurylinklabs.watchtower.enable=true"    

volumes:
  caddy_data:
  caddy_config:

networks:
  frontend_net:
    external: true
