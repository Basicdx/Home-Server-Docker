services:
#########################
# IMMICH | photo manager
#########################
  immich-server:
    image: ghcr.io/immich-app/immich-server:v1.111.0
    container_name: immich_server
    hostname: immich_server
    restart: unless-stopped
    ports:
      - "2283:2283"
    env_file:
      - .env
    volumes:
      - ${DATA:?err}/immich/upload:/usr/src/app/upload
      - ${DATA:?err}/immich/data:/data      
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - database
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true       
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s      
    deploy:
      resources:
        limits:
          memory: 1024M # 1 Go max
          cpus: '1.5'

  immich-microservices:
    image: ghcr.io/immich-app/immich-server:v1.111.0
    container_name: immich_microservices
    restart: unless-stopped
    command: ['start.sh', 'microservices']
    volumes:
      - ${DATA}/immich/cache:/cache    
      - ${DATA:?err}/immich/upload:/usr/src/app/upload    
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    # environment:
      # - UPLOAD_LOCATION=${PHOTOS_DIR_LOCAL}    
      # - DB_DATA_LOCATION=${CONFIG_BASE_DIR}/immich
      # - IMMICH_VERSION=${IMMICH_VERSION}
      # - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      # - DB_USERNAME=${IMMICH_DB_USERNAME}
      # - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      # - REDIS_HOSTNAME=immich-redis
      # - DB_HOSTNAME=immich-database        
    depends_on:
      - redis
      - database
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true       
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.5'

  # đźš¨ CONTENEUR MACHINE-LEARNING VOLONTAIREMENT RETIRĂ‰ đźš¨
  # Sur un iMac 2010, la gĂ©nĂ©ration de miniatures et la reconnaissance faciale
  # prendraient des semaines et bloqueraient le serveur.

  redis:
    image: redis:7.2-alpine # Alpin pour Ă©conomiser la RAM
    container_name: immich_redis
    hostname: immich_redis
    restart: unless-stopped
    # environment:
    #   - UPLOAD_LOCATION=${PHOTOS_DIR_LOCAL}
    #   - DB_DATA_LOCATION=${CONFIG_BASE_DIR}/immich/database
    #   - IMMICH_VERSION=${IMMICH_VERSION}
    #   - DB_PASSWORD=${IMMICH_DB_PASSWORD}
    #   - DB_USERNAME=${IMMICH_DB_USERNAME}
    #   - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
    #   - REDIS_HOSTNAME=immich-redis
    #   - DB_HOSTNAME=immich-database
    # volumes:  
    #   - ${CONFIG_BASE_DIR}/immich_redis:/data    
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true       
    healthcheck:
      test: redis-cli ping || exit 1      
    deploy:
      resources:
        limits:
          memory: 128M

  database:
    image: tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich_db
    hostname: immich_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?err}
      POSTGRES_USER: ${DB_USERNAME:?err}
      POSTGRES_DB: ${DB_DATABASE_NAME:?err}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      REDIS_HOSTNAME : immich_redis
      DB_HOSTNAME : immich_db            
    volumes:
      - $(DATA:?err)/immich/pgdata:/var/lib/postgresql/data
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true        
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  frontend:
    name: frontend
    driver: bridge