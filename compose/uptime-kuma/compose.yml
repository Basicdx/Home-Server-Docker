services:
##########################
## UPTIME-KUMA | Monitoring Server
##########################
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma

    env_file:
      - ${BASE_DIR}/.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    cap_drop:
      - ALL
    volumes:
      - ./data:/app/data
    networks:
      - frontend_net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  frontend_net:
    external: true