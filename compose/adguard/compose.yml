services:
#########################
# ADGUARDHOME | Home DNS
#########################
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - 53:53/tcp # plain dns over tcp
      - 53:53/udp # plain dns over udp
      # - 82:82/tcp # http web interface
      - 3001:3000/tcp # initial setup web interface
    env_file:
      - .env
    volumes:
      - ${DATA:?err}/adguardhome/config:/conf # app configuration
      - ${DATA:?err}/adguardhome/work:/work # app working directory
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'       

networks:
  frontend:
    name: frontend
    driver: bridge
