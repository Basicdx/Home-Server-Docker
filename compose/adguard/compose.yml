services:
#########################
# ADGUARDHOME | Home DNS
#########################
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - 53:53/tcp # plain dns over tcp
      - 53:53/udp # plain dns over udp
      - 82:82/tcp # http web interface
      - 3000:3000/tcp # initial setup web interface
    volumes:
      - ${CONFIG}/adguardhome:/config # app configuration
      - ${CONFIG}/adguardhome:/work # app working directory
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  frontend:
    driver: bridge
    external: true