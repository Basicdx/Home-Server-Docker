services:
#########################
# TAILSCALE | Secure Remote Access
#########################
  tailscale:
    image: tailscale/tailscale:1.68.0
    container_name: tailscale
    restart: unless-stopped
    hostname: ${HOSTNAME:?err}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE 
    env_file:
      - .env    
    environment:
      - TS_ACCEPT_DNS=false # Désactive le DNS de Tailscale (AdGuard gère ça)
      - TS_AUTHKEY=${TS_AUTHKEY:?err}
      # - TS_DEST_IP=${TS_DEST_IP}
      - TS_EXTRA_ARGS=--accept-routes --dns=100.100.100.100,1.1.1.1 # Accept local network routes
      # - TS_KUBE_SECRET=${TS_KUBE_SECRET}
      # - TS_OUTBOUND_HTTP_PROXY_LISTEN=${TS_OUTBOUND_HTTP_PROXY_LISTEN}
      # - TS_ROUTES=${TS_ROUTES}
      # - TS_SOCKET=${TS_SOCKET}
      # - TS_SOCKS5_SERVER=${TS_SOCKS5_SERVER} 
      # - TS_STATE_DIR=/var/lib/tailscale
      # - TS_TAILSCALED_EXTRA_ARGS=${TS_TAILSCALED_EXTRA_ARGS}
      - TS_USERSPACE=false
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ${DATA:?err}/tailscale/state:/var/lib/tailscale
      - ${DATA:?err}/tailscale/tmp:/tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "tailscale status | grep -q '100.99.99.99' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s      
    deploy:
      resources:
        limits:
          memory: 128M # Tailscale is extremly lightweight
          cpus: '0.2'      

    # device:
    #   - /dev/net/tun:/dev/net/tun
