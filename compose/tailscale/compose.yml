services:
#########################
# TAILSCALE | Secure Remote Access
#########################
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: ${HOSTNAME:?err}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE 
    env_file:
      - .env    
    # secrets:
    #   - TS_AUTHKEY
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?err}
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--accept-routes # Accept local network routes
      # - TS_STATE_DIR=/var/lib/tailscale
      # - TS_ACCEPT_DNS=${TS_ACCEPT_DNS} # Désactive le DNS de Tailscale (AdGuard gère ça)
    volumes:
      - ${DATA:?err}/tailscale/state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun 
    # networks:
    #   - frontend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M # Tailscale is extremly lightweight
          cpus: '0.2'      

