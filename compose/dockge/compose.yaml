services:
  ##########################
  ## DOCKGE | Dashboard
  ##########################
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOCKGE_STACKS_DIR=/stacks
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
      - ${BASE_DIR}:/stacks
    networks:
      - frontend_net
    ports:
      - "5001:5001"    
    
    security_opt:
      - no-new-privileges:true

networks:
  frontend_net:
    driver: bridge
    external: true
