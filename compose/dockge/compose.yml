services:
  #########################
  # DOCKGE | Manage Containers
  #########################
  dockge:
    image: louislam/dockge:1.4.2
    container_name: dockge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 5001:5001
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      # - DOCKGE_STACKS_DIR=/opt/stacks
      - DOCKGE_STACKS_DIR=app/compose
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA:?err}/dockge/data:/app/data
      # Montage de ton dossier de stacks pour que Dockge les voie      
      # - ${STACKS:?err}:/opt/stacks
      - ${STACKS:?err}:app/compose
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
    name: frontend
    driver: bridge
