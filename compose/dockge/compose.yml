services:
  #########################
  # DOCKGE | Manage Containers
  #########################
  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    env_file:
      - .env
    ports:
      - 5001:5001
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - DOCKGE_STACKS_DIR=/opt/stacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA:?err}/dockge/data:/app/data
      - ${STACKS:?err}:/opt/stacks
    networks:
      - frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
networks:
  frontend:
    driver: bridge
    external: true
