services:
  ##########################
  ## DOCKGE | Dashboard
  ##########################
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped
    ports:
      - "5001:5001"    

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - DOCKGE_STACKS_DIR=/opt/stacks
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /opt/stacks:/opt/stacks
    networks:
      - frontend_net
    security_opt:
      - no-new-privileges:true

networks:
  frontend_net:
    driver: bridge
    external: true
