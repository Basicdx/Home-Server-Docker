services:
##########################
## DOCKGE | Dashboard
##########################
  dockge:
    image: louislam/dockge:1
    container_name: dockge

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # dossiers de stacks
      - /home/$USER/Homelab/compose:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
    
    ports:
      - "5001:5001"

    restart: unless-stopped