services:
##########################
## HOMEPAGE | Dashboard
##########################
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage

    env_file:
      - ${BASE_DIR}/.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend_net
    ports:
      - "3000:3000"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  frontend_net:
    external: true