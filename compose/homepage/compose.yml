services:
##########################
## HOMEPAGE | Dashboard
##########################
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "3000:3000"
    restart: unless-stopped