##########################
# CORE | Dashboard
##########################
services:
  # DOCKGE | Dashboard
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped

    environment:
      - TZ=${TZ}
      - DOCKGE_STACKS_DIR=/stacks
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../app_data/dockge:/app/data
      - ..:/stacks
    networks:
      - frontend_net
    ports:
      - "5001:5001"    
    
    security_opt:
      - no-new-privileges:true













networks:
  frontend_net:
    driver: bridge
    external: true
