services:
  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    restart: unless-stopped

    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:?err}/dockge/data:/app/data
      - ${HOME_DIR:?err}/compose:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
        
        
networks:
  frontend:
    driver: bridge
    external: true

