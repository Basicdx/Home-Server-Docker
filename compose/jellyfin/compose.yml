services:
#########################
# JELLYFIN | mediaplayer
#########################
  jellyfin:
    image: jellyfin/jellyfin:10.10.3 # Version stable épinglée
    container_name: jellyfin
    restart: unless-stopped
    ports:
      # - 1900:1900/udp #DLNA port
      # - 7359:7359/udp #network discovery    
      - "8096:8096"
      - 8920:8920 #https
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TZ:?err}
    volumes:
      - ${DATA:?err}/jellyfin/config:/config
      - ${DATA:?err}/jellyfin/cache:/cache
      - ${MEDIA:?err}:/media:ro #read-only
      # - ${MOVIES_DIR_LOCAL}:${MOVIES_DIR_RELATIVE}:ro #read-only
      # - ${MUSIC_DIR_LOCAL}:${MUSIC_DIR_RELATIVE}:ro #read-only
      # - ${TV_DIR_LOCAL}:${TV_DIR_RELATIVE}:ro #read-only
      # - ${BOOKS_DIR_LOCAL}:${BOOKS_DIR_RELATIVE}:ro #read-only
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s      
    deploy:
      resources:
        limits:
          memory: 1536M # 1.5 Go max. Suffisant pour le stream direct.
          cpus: '2.0'

networks:
  frontend:
    driver: bridge
    external: true